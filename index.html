<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Card</title>
    <link rel="stylesheet" href="script.css">
</head>
<body>
    <div class="report-card">
        <div class="header">
            <img src="logo.jpg" alt="School Logo" class="logo">

            <div class="school-info">
                <h1>Delhi Public School</h1>
                <p>Academic Report Card</p>
            </div>

        </div>

        <div class="info">
            <span>Name : Mohin</span>
            <span>Class : XII - A</span>
            <!-- <span>Father's Name : Mr. Rahul</span>
            <span>Mother's Name : Mrs. Pooja</span> -->
        </div>

        <table>
            <tr>
                <th>Subject</th>
                <th>Marks Obtained</th>
                <th>Grade</th>
            </tr>

            <tr>
                <th>Maths</th>
                <th>80</th>
                <th>A</th>
            </tr>

            <tr>
                <th>Physics</th>
                <th>75</th>
                <th>B</th>
            </tr>

            <tr>
                <th>English</th>
                <th>90</th>
                <th>A+</th>
            </tr>

            <tr>
                <th>Chemistry</th>
                <th>88</th>
                <th>A</th>
            </tr>

            <tr>
                <th>IT</th>
                <th>79</th>
                <th>B</th>
            </tr>
        </table>

        <div id="result">
            Percentage : 82.4% | PASS
        </div>
        <div id="footer">
            <div class="sign">
                <div class="line"></div>
                Teacher's Signature
            </div>

            <div class="sign">
                <div class="line"></div>
                Principal's Signature
            </div>



        </div>
    </div>

    
</body>
</html>
